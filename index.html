<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scouting Book - FPL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07090f;--bg1:#0c1018;--bg2:#101520;--bg3:#141c2c;--bg4:#1a2438;
  --gold:#d4a843;--gold2:#a07828;--red:#c03535;--green:#2e8a58;
  --blue:#2a6db5;--purple:#6b4fa0;--orange:#c46020;
  --t1:#dde2ef;--t2:#7a88a8;--t3:#3a4560;
  --border:#171e30;--border2:#222f48;
}
body{font-family:"Inter",sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh}
.app{padding:14px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.logo-row{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.app-title{font-family:"Rajdhani",sans-serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:1px}
.app-sub{font-size:10px;color:var(--t3);margin-top:1px}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn-gold{padding:7px 12px;background:var(--gold);color:#07090f;border:none;border-radius:6px;font-family:"Rajdhani",sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{padding:7px 10px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--t2);font-size:12px;cursor:pointer}
.btn-ghost:hover{background:var(--bg3);color:var(--t1)}
.stats-row{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap}
.sc{padding:4px 9px;border-radius:5px;background:var(--bg2);border:1px solid var(--border);font-family:"Rajdhani",sans-serif;font-size:11px;font-weight:600;color:var(--t2)}
.sc b{color:var(--gold)}
.sc.danger b{color:var(--red)}
.cols-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.card{width:256px;flex-shrink:0;border:1px solid var(--border);border-radius:10px;background:var(--bg1)}
.card:hover{border-color:var(--border2)}
.card-hdr{padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;border-radius:10px 10px 0 0}
.team-ico{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:"Rajdhani",sans-serif;font-weight:700;flex-shrink:0}
.name-inp{flex:1;background:transparent;border:none;outline:none;font-family:"Rajdhani",sans-serif;font-weight:700;font-size:13px;color:var(--t1);min-width:0}
.stars{display:flex;gap:2px}
.star{font-size:12px;cursor:pointer;color:var(--bg4);line-height:1;user-select:none}
.star.on{color:var(--gold)}
.del-btn{width:20px;height:20px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:12px;border-radius:3px;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:#2d1010;color:var(--red)}
.body{padding:9px 10px;display:flex;flex-direction:column;gap:8px}
.slabel{font-family:"Rajdhani",sans-serif;font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.divider{height:1px;background:var(--border);margin:1px 0}
.lanes{display:flex;flex-direction:column;gap:4px}
.lane-row{border-radius:7px;background:var(--bg2);border:1px solid var(--border);overflow:hidden}
.lane-hdr{display:flex;align-items:center;gap:5px;padding:3px 6px}
.lane-lbl{font-family:"Rajdhani",sans-serif;font-size:9px;font-weight:700;letter-spacing:.8px;width:30px;text-align:center;padding:2px 0;border-radius:3px;flex-shrink:0}
.ll-DSL{background:#1e0d28;color:#c090f0;border:1px solid #4a2070}
.ll-JUG{background:#280d0d;color:#e07070;border:1px solid #701010}
.ll-MID{background:#0a1828;color:#70a0e0;border:1px solid #1a3a70}
.ll-ADC{background:#1e1208;color:#d09050;border:1px solid #704010}
.ll-SUP{background:#0a1a14;color:#60c090;border:1px solid #105a30}
.lane-add{width:18px;height:18px;border:1px dashed var(--border2);border-radius:3px;background:transparent;color:var(--t3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0}
.lane-add:hover{border-color:var(--gold2);color:var(--gold)}
.hero-items{display:flex;flex-direction:column;gap:2px;padding:0 6px 4px}
.hero-item{display:flex;align-items:center;gap:4px;padding:2px 0}
.av-box{width:30px;height:30px;border-radius:5px;flex-shrink:0;cursor:pointer;border:1px solid var(--border2);overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.av-box:hover{border-color:var(--gold2)}
.av-box img{width:100%;height:100%;object-fit:cover}
.av-plus{font-size:14px;color:var(--t3)}
.hero-inp{flex:1;min-width:0;background:transparent;border:none;outline:none;font-size:11px;color:var(--t1)}
.hero-inp::placeholder{color:var(--t3);font-size:10px}
.cnt-wrap{display:flex;align-items:center;gap:2px;flex-shrink:0}
.cnt-btn{width:16px;height:16px;border:1px solid var(--border2);border-radius:3px;background:var(--bg3);color:var(--t2);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1}
.cnt-btn:hover{background:var(--bg4);color:var(--t1)}
.cnt-num{font-family:"Rajdhani",sans-serif;font-size:13px;font-weight:700;min-width:16px;text-align:center}
.cnt-h{color:var(--red)}.cnt-m{color:var(--orange)}.cnt-l{color:var(--t2)}
.rm-hero{width:13px;height:13px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:11px;flex-shrink:0}
.rm-hero:hover{color:var(--red)}
.style-wrap{display:flex;flex-wrap:wrap;gap:3px}
.stag{padding:3px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:"Rajdhani",sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--t3);user-select:none}
.stag.on-r{background:#280d0d;border-color:#8a2020;color:#e07070}
.stag.on-b{background:#0a1828;border-color:#1a4a88;color:#7090e0}
.stag.on-g{background:#0a1e12;border-color:#1a5a30;color:#60c080}
.stag.on-p{background:#140d28;border-color:#4a2888;color:#a070e0}
.stag.on-o{background:#1e1208;border-color:#7a3a10;color:#d08040}
.wb{background:var(--bg2);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.wb-row{padding:5px 8px;display:flex;align-items:flex-start;gap:6px;border-bottom:1px solid var(--border)}
.wb-row:last-child{border-bottom:none}
.wbl{font-family:"Rajdhani",sans-serif;font-size:8px;font-weight:700;letter-spacing:.8px;padding:2px 4px;border-radius:3px;flex-shrink:0;margin-top:2px}
.wbl-w{background:#280d0d;color:#e07070}
.wbl-c{background:#0a1828;color:#7090e0}
.wb-ta{flex:1;background:transparent;border:none;outline:none;font-size:10px;color:var(--t1);resize:none;min-height:28px;line-height:1.5;font-family:"Inter",sans-serif}
.wb-ta::placeholder{color:var(--t3);font-size:9px}
.bp-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.ban-tag{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;background:#220a0a;border:1px solid #5a1818;color:#e08080}
.ban-tag button{background:none;border:none;cursor:pointer;color:#c04040;font-size:10px;padding:0;line-height:1}
.pick-tag{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;background:#0a1e10;border:1px solid #185a28;color:#70d090}
.pick-tag button{background:none;border:none;cursor:pointer;color:#30a060;font-size:10px;padding:0;line-height:1}
.bp-row{display:flex;gap:4px}
.bp-inp{flex:1;font-size:10px;padding:3px 6px;border:1px solid var(--border2);border-radius:5px;background:var(--bg2);color:var(--t1);outline:none}
.bp-inp.bi{border-color:#5a1818;background:#180808;color:#e08080}
.bp-inp.pi{border-color:#185a28;background:#081508;color:#70d090}
.bp-add{padding:3px 7px;border-radius:5px;background:transparent;cursor:pointer;font-size:12px;border:1px solid;flex-shrink:0}
.bp-add.b{border-color:#c03535;color:#c03535}
.bp-add.p{border-color:#2e8a58;color:#2e8a58}
.notes-ta{width:100%;font-size:10px;line-height:1.5;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--t1);resize:vertical;min-height:44px;outline:none;font-family:"Inter",sans-serif}
.notes-ta::placeholder{color:var(--t3);font-size:9px}
.card-foot{padding:6px 10px;background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;border-radius:0 0 10px 10px}
.foot-info{font-family:"Rajdhani",sans-serif;font-size:10px;color:var(--t3)}
.foot-info b{color:var(--gold)}
#av-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center}
#av-overlay.show{display:flex}
.av-inner{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;width:380px;max-width:95vw;display:flex;flex-direction:column;gap:10px}
.av-title{font-family:"Rajdhani",sans-serif;font-size:14px;font-weight:700;color:var(--gold)}
#av-search-inp{width:100%;padding:6px 9px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--t1);font-size:11px;outline:none}
#av-grid-inner{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;overflow-y:auto;max-height:260px}
.av-img{width:36px;height:36px;border-radius:5px;object-fit:cover;cursor:pointer;border:2px solid transparent}
.av-img:hover{border-color:var(--gold2)}
.av-img.av-sel{border-color:var(--gold)}
.av-footer{display:flex;gap:7px}
#imp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center}
#imp-overlay.show{display:flex}
.imp-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:18px;width:300px;max-width:95vw}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo-row">
      <div class="logo">&#x2694;</div>
      <div>
        <div class="app-title">SCOUTING BOOK</div>
        <div class="app-sub">FPL &#xB7; 5 Lane &#xB7; Coach Edition</div>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="btn-ghost" id="btn-import">&#x2B06; Import</button>
      <button class="btn-gold" id="btn-add-team">+ Th&#xEA;m &#x111;&#x1ED9;i</button>
    </div>
  </div>
  <div class="stats-row" id="stats"></div>
  <div class="cols-grid" id="cols"></div>
</div>
<div id="av-overlay">
  <div class="av-inner">
    <div class="av-title">Ch&#x1ECD;n avatar t&#x01B0;&#x1EDB;ng (FPL)</div>
    <input id="av-search-inp" placeholder="T&#xEC;m theo s&#x1ED1;: 0, 1, 2...">
    <div id="av-grid-inner"></div>
    <div class="av-footer">
      <button id="av-clear-btn" style="padding:7px 10px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--t2);font-size:11px;cursor:pointer">X&#x1EDB;a</button>
      <button id="av-done-btn" style="flex:1;padding:7px;background:var(--gold);color:#07090f;border:none;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:12px;cursor:pointer">Xong</button>
    </div>
  </div>
</div>
<div id="imp-overlay">
  <div class="imp-box">
    <div style="font-family:Rajdhani,sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:8px">Import t&#x01B0;&#x1EDB;ng nhanh</div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:8px">M&#x1ED7;i d&#xF2;ng: T&#xEA;n:s&#x1ED1; LANE<br>VD: <span style="color:var(--gold)">Nakroth:9 JUG</span></div>
    <select id="imp-team-sel" style="width:100%;padding:6px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--t1);font-size:12px;margin-bottom:7px;outline:none"></select>
    <textarea id="imp-ta" style="width:100%;height:110px;padding:7px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--t1);font-size:11px;resize:vertical;outline:none;font-family:Inter,sans-serif" placeholder="Nakroth:9 JUG&#10;Loong:8 DSL&#10;Tulen:7 MID&#10;Violet:6 ADC&#10;Zip:5 SUP"></textarea>
    <div style="display:flex;gap:7px;margin-top:9px">
      <button id="imp-do-btn" style="flex:1;padding:8px;background:var(--gold);color:#07090f;border:none;border-radius:6px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:13px;cursor:pointer">Import</button>
      <button id="imp-cancel-btn" style="padding:8px 12px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--t2);font-size:12px;cursor:pointer">Hu&#x1EF7;</button>
    </div>
  </div>
</div>

const LANES = ["DSL","JUG","MID","ADC","SUP"];
const LANE_CSS = {DSL:"ll-DSL",JUG:"ll-JUG",MID:"ll-MID",ADC:"ll-ADC",SUP:"ll-SUP"};
const STYLES = [
  {l:"Teamfight",c:"r"},{l:"Early game",c:"r"},{l:"Dive",c:"r"},
  {l:"Poke",c:"b"},{l:"Protect ADC",c:"b"},
  {l:"Split push",c:"g"},{l:"Late game",c:"o"},
  {l:"Counter JG",c:"p"},
];
const COLORS = ["#d4a843","#c03535","#2a6db5","#2e8a58","#6b4fa0","#c46020","#1e8888","#c03580","#888820","#206088"];

function defLanes(){
  var o={};
  LANES.forEach(function(l){ o[l]={h:[{n:"",c:1,img:""}]}; });
  return o;
}

function loadTeams(){
  var keys=["sb9","sb8","sb7","sb6"];
  for(var i=0;i<keys.length;i++){
    var raw=localStorage.getItem(keys[i]);
    if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  }
  return null;
}

var teams = loadTeams() || [
  {id:1,name:"FW",color:"#d4a843",rating:5,lanes:defLanes(),styles:["Teamfight","Early game"],weakness:"",counter:"",bans:[],picks:[],notes:""},
];

teams = teams.map(function(t){
  if(!t.lanes){
    t.lanes = defLanes();
    if(t.champs && t.champs.length){
      t.champs.forEach(function(c){
        t.lanes.DSL.h.push({n:c.n||c.name||"",c:c.c||1,img:c.img||""});
      });
      t.lanes.DSL.h = t.lanes.DSL.h.filter(function(h){return h.n;});
      if(!t.lanes.DSL.h.length) t.lanes.DSL.h=[{n:"",c:1,img:""}];
    }
  }
  LANES.forEach(function(l){
    if(!t.lanes[l]) t.lanes[l]={h:[{n:"",c:1,img:""}]};
    if(!t.lanes[l].h||!t.lanes[l].h.length) t.lanes[l].h=[{n:"",c:1,img:""}];
  });
  if(!t.bans)t.bans=[];
  if(!t.picks)t.picks=[];
  if(!t.styles)t.styles=[];
  if(!t.weakness)t.weakness="";
  if(!t.counter)t.counter="";
  if(!t.notes)t.notes="";
  return t;
});
var nid = Math.max.apply(null,[0].concat(teams.map(function(t){return t.id;})))+1;
localStorage.setItem("sb9", JSON.stringify(teams));

function save(){ localStorage.setItem("sb9", JSON.stringify(teams)); }
function cc(n){ return n>=7?"cnt-h":n>=4?"cnt-m":"cnt-l"; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// AVATAR PICKER
var avCb=null, avCurrent="";
function openAvPicker(teamId,lane,hi){
  avCurrent = (function(){
    var t=teams.filter(function(t){return t.id===teamId;})[0];
    return t&&t.lanes[lane]&&t.lanes[lane].h[hi]?t.lanes[lane].h[hi].img:"";
  })();
  avCb = function(key){
    var t=teams.filter(function(t){return t.id===teamId;})[0];
    if(t&&t.lanes[lane]&&t.lanes[lane].h[hi]!==undefined){
      t.lanes[lane].h[hi].img=key;
      save(); render();
    }
  };
  buildAvGrid("");
  document.getElementById("av-search-inp").value="";
  document.getElementById("av-overlay").classList.add("show");
}
function buildAvGrid(q){
  var grid=document.getElementById("av-grid-inner");
  var keys=Object.keys(IMGS).filter(function(k){ return !q||k.indexOf(q)>=0; });
  grid.innerHTML=keys.map(function(k){
    return '<img class="av-img'+(avCurrent===k?" av-sel":"")+'" src="'+IMGS[k]+'" data-k="'+k+'" title="#'+k+'">';
  }).join("");
  var imgs=grid.querySelectorAll(".av-img");
  for(var i=0;i<imgs.length;i++){
    imgs[i].addEventListener("click",function(){
      avCurrent=this.dataset.k;
      var all=grid.querySelectorAll(".av-img");
      for(var j=0;j<all.length;j++) all[j].classList.remove("av-sel");
      this.classList.add("av-sel");
      if(avCb) avCb(avCurrent);
    });
  }
}
document.getElementById("av-search-inp").addEventListener("input",function(){ buildAvGrid(this.value.trim()); });
document.getElementById("av-done-btn").addEventListener("click",function(){ document.getElementById("av-overlay").classList.remove("show"); });
document.getElementById("av-clear-btn").addEventListener("click",function(){ if(avCb)avCb(""); document.getElementById("av-overlay").classList.remove("show"); });
document.getElementById("av-overlay").addEventListener("click",function(e){ if(e.target===this)this.classList.remove("show"); });

// TEAM OPS
function addTeam(){
  var color=COLORS[teams.length%COLORS.length];
  teams.push({id:nid++,name:"Doi moi",color:color,rating:0,lanes:defLanes(),styles:[],weakness:"",counter:"",bans:[],picks:[],notes:""});
  save(); render();
  setTimeout(function(){ var inps=document.querySelectorAll(".name-inp"); if(inps.length) inps[inps.length-1].select(); },60);
}
function delTeam(id){ if(!confirm("Xoa doi nay?"))return; teams=teams.filter(function(t){return t.id!==id;}); save(); render(); }
function setRating(id,v){ teams.filter(function(t){return t.id===id;})[0].rating=v; save(); render(); }
function addHero(teamId,lane){
  var t=teams.filter(function(t){return t.id===teamId;})[0];
  t.lanes[lane].h.push({n:"",c:1,img:""});
  save(); render();
}
function removeHero(teamId,lane,hi){
  var t=teams.filter(function(t){return t.id===teamId;})[0];
  t.lanes[lane].h.splice(hi,1);
  if(!t.lanes[lane].h.length) t.lanes[lane].h=[{n:"",c:1,img:""}];
  save(); render();
}
function adjCnt(teamId,lane,hi,d){
  var t=teams.filter(function(t){return t.id===teamId;})[0];
  var h=t.lanes[lane].h[hi];
  if(!h)return;
  h.c=Math.max(0,h.c+d);
  if(h.c===0){ t.lanes[lane].h.splice(hi,1); if(!t.lanes[lane].h.length)t.lanes[lane].h=[{n:"",c:1,img:""}]; }
  save(); render();
}
function togStyle(id,s){
  var t=teams.filter(function(t){return t.id===id;})[0];
  var i=t.styles.indexOf(s);
  if(i>=0)t.styles.splice(i,1); else t.styles.push(s);
  save(); render();
}
function addBan(id){
  var inp=document.getElementById("bi-"+id);
  var v=inp.value.trim(); if(!v)return;
  var t=teams.filter(function(t){return t.id===id;})[0];
  if(t.bans.indexOf(v)<0){t.bans.push(v);save();render();}
  inp.value="";
}
function rmBan(id,i){ teams.filter(function(t){return t.id===id;})[0].bans.splice(i,1); save(); render(); }
function addPick(id){
  var inp=document.getElementById("pi-"+id);
  var v=inp.value.trim(); if(!v)return;
  var t=teams.filter(function(t){return t.id===id;})[0];
  if(t.picks.indexOf(v)<0){t.picks.push(v);save();render();}
  inp.value="";
}
function rmPick(id,i){ teams.filter(function(t){return t.id===id;})[0].picks.splice(i,1); save(); render(); }

// IMPORT
document.getElementById("btn-import").addEventListener("click",function(){
  var sel=document.getElementById("imp-team-sel");
  sel.innerHTML=teams.map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join("");
  document.getElementById("imp-overlay").classList.add("show");
});
document.getElementById("imp-cancel-btn").addEventListener("click",function(){ document.getElementById("imp-overlay").classList.remove("show"); });
document.getElementById("imp-overlay").addEventListener("click",function(e){ if(e.target===this)this.classList.remove("show"); });
document.getElementById("imp-do-btn").addEventListener("click",function(){
  var tid=parseInt(document.getElementById("imp-team-sel").value);
  var ta=document.getElementById("imp-ta").value;
  var t=teams.filter(function(x){return x.id===tid;})[0]; if(!t)return;
  var lines=ta.split("\n");
  for(var i=0;i<lines.length;i++){
    var p=lines[i].trim(); if(!p)continue;
    var seg=p.split(" ");
    var lastSeg=seg[seg.length-1].toUpperCase();
    var validLanes=["DSL","JUG","MID","ADC","SUP"];
    var lane=validLanes.indexOf(lastSeg)>=0?lastSeg:"DSL";
    var core=validLanes.indexOf(lastSeg)>=0?seg.slice(0,-1).join(" ").trim():p;
    var colon=core.lastIndexOf(":");
    var name=colon>=0?core.substring(0,colon).trim():core.trim();
    var cnt=colon>=0?parseInt(core.substring(colon+1))||1:1;
    if(!name)continue;
    var ex=null;
    for(var j=0;j<t.lanes[lane].h.length;j++){ if(t.lanes[lane].h[j].n===name){ex=t.lanes[lane].h[j];break;} }
    if(ex){ ex.c+=cnt; }
    else if(t.lanes[lane].h.length===1&&!t.lanes[lane].h[0].n){ t.lanes[lane].h[0]={n:name,c:cnt,img:""}; }
    else{ t.lanes[lane].h.push({n:name,c:cnt,img:""}); }
  }
  save(); render();
  document.getElementById("imp-overlay").classList.remove("show");
  document.getElementById("imp-ta").value="";
});
document.getElementById("btn-add-team").addEventListener("click", addTeam);

// RENDER
function renderStats(){
  var total=0,danger=0;
  for(var i=0;i<teams.length;i++){
    var t=teams[i];
    for(var j=0;j<LANES.length;j++){
      var h=t.lanes[LANES[j]].h;
      for(var k=0;k<h.length;k++) if(h[k].n) total+=h[k].c;
    }
    if(t.rating>=4) danger++;
  }
  document.getElementById("stats").innerHTML=
    '<div class="sc">Doi: <b>'+teams.length+'</b></div>'+
    '<div class="sc">Tong lan dung: <b>'+total+'</b></div>'+
    '<div class="sc danger">4+ sao: <b>'+danger+'</b></div>';
}

function render(){
  var cols=document.getElementById("cols");
  var html="";
  for(var ti=0;ti<teams.length;ti++){
    var t=teams[ti];
    var totalU=0,totalH=0;
    for(var li=0;li<LANES.length;li++){
      var lh=t.lanes[LANES[li]].h;
      for(var hi=0;hi<lh.length;hi++){ if(lh[hi].n){totalU+=lh[hi].c;totalH++;} }
    }
    var lanesHtml="";
    for(var li=0;li<LANES.length;li++){
      var lane=LANES[li];
      var heroRows="";
      var lh=t.lanes[lane].h;
      for(var hi=0;hi<lh.length;hi++){
        var h=lh[hi];
        var imgSrc=h.img&&IMGS[h.img]?IMGS[h.img]:"";
        var avInner=imgSrc?'<img src="'+imgSrc+'" style="width:100%;height:100%;object-fit:cover">':'<span class="av-plus">+</span>';
        var cntClass=h.c>=7?"cnt-h":h.c>=4?"cnt-m":"cnt-l";
        heroRows+='<div class="hero-item">'+
          '<div class="av-box" data-tid="'+t.id+'" data-lane="'+lane+'" data-hi="'+hi+'">'+avInner+'</div>'+
          '<input class="hero-inp" value="'+esc(h.n)+'" placeholder="Ten tuong..." data-tid="'+t.id+'" data-lane="'+lane+'" data-hi="'+hi+'">'+
          '<div class="cnt-wrap">'+
            '<button class="cnt-btn" data-action="dec" data-tid="'+t.id+'" data-lane="'+lane+'" data-hi="'+hi+'">-</button>'+
            '<span class="cnt-num '+cntClass+'">'+h.c+'</span>'+
            '<button class="cnt-btn" data-action="inc" data-tid="'+t.id+'" data-lane="'+lane+'" data-hi="'+hi+'">+</button>'+
          '</div>'+
          '<button class="rm-hero" data-action="rm" data-tid="'+t.id+'" data-lane="'+lane+'" data-hi="'+hi+'">x</button>'+
        '</div>';
      }
      lanesHtml+='<div class="lane-row">'+
        '<div class="lane-hdr">'+
          '<div class="lane-lbl '+LANE_CSS[lane]+'">'+lane+'</div>'+
          '<button class="lane-add" data-action="addh" data-tid="'+t.id+'" data-lane="'+lane+'">+</button>'+
        '</div>'+
        '<div class="hero-items">'+heroRows+'</div>'+
      '</div>';
    }
    var stylesHtml="";
    for(var si=0;si<STYLES.length;si++){
      var s=STYLES[si];
      var on=t.styles.indexOf(s.l)>=0;
      stylesHtml+='<span class="stag'+(on?" on-"+s.c:"")+'" data-action="style" data-tid="'+t.id+'" data-style="'+s.l+'">'+s.l+'</span>';
    }
    var bansHtml=t.bans.map(function(b,i){ return '<span class="ban-tag">'+esc(b)+'<button data-action="rmban" data-tid="'+t.id+'" data-i="'+i+'">x</button></span>'; }).join("");
    var picksHtml=t.picks.map(function(p,i){ return '<span class="pick-tag">'+esc(p)+'<button data-action="rmpick" data-tid="'+t.id+'" data-i="'+i+'">x</button></span>'; }).join("");
    var stars=[1,2,3,4,5].map(function(s){ return '<span class="star'+(t.rating>=s?" on":"")+'" data-action="star" data-tid="'+t.id+'" data-v="'+s+'">&#9733;</span>'; }).join("");

    html+='<div class="card" data-cid="'+t.id+'">'+
      '<div class="card-hdr">'+
        '<div class="team-ico" style="background:'+t.color+'22;color:'+t.color+';border:1px solid '+t.color+'44">'+t.name.charAt(0)+'</div>'+
        '<input class="name-inp" style="color:'+t.color+'" value="'+esc(t.name)+'" data-tid="'+t.id+'" placeholder="Ten doi">'+
        '<div class="stars">'+stars+'</div>'+
        '<button class="del-btn" data-action="del" data-tid="'+t.id+'">x</button>'+
      '</div>'+
      '<div class="body">'+
        '<div><div class="slabel">5 LANE - TUONG HAY DUNG</div><div class="lanes">'+lanesHtml+'</div></div>'+
        '<div class="divider"></div>'+
        '<div><div class="slabel">LOI DANH</div><div class="style-wrap">'+stylesHtml+'</div></div>'+
        '<div class="divider"></div>'+
        '<div><div class="slabel">DIEM YEU & CACH COUNTER</div>'+
          '<div class="wb">'+
            '<div class="wb-row"><span class="wbl wbl-w">YEU</span><textarea class="wb-ta" data-field="weakness" data-tid="'+t.id+'" placeholder="Diem yeu...">'+esc(t.weakness)+'</textarea></div>'+
            '<div class="wb-row"><span class="wbl wbl-c">COUNTER</span><textarea class="wb-ta" data-field="counter" data-tid="'+t.id+'" placeholder="Minh nen draft/choi the nao...">'+esc(t.counter)+'</textarea></div>'+
          '</div>'+
        '</div>'+
        '<div class="divider"></div>'+
        '<div><div class="slabel">CAN BAN</div>'+
          '<div class="bp-tags">'+bansHtml+'</div>'+
          '<div class="bp-row"><input id="bi-'+t.id+'" class="bp-inp bi" placeholder="Tuong phai ban..."><button class="bp-add b" data-action="addban" data-tid="'+t.id+'">+</button></div>'+
        '</div>'+
        '<div><div class="slabel">UU TIEN PICK</div>'+
          '<div class="bp-tags">'+picksHtml+'</div>'+
          '<div class="bp-row"><input id="pi-'+t.id+'" class="bp-inp pi" placeholder="Tuong muon pick..."><button class="bp-add p" data-action="addpick" data-tid="'+t.id+'">+</button></div>'+
        '</div>'+
        '<div class="divider"></div>'+
        '<div><div class="slabel">GHI CHU</div>'+
          '<textarea class="notes-ta" data-field="notes" data-tid="'+t.id+'" placeholder="Chien thuat, thoi quen, lich su...">'+esc(t.notes)+'</textarea>'+
        '</div>'+
      '</div>'+
      '<div class="card-foot"><span class="foot-info">Tong: <b>'+totalU+'</b> lan - <b>'+totalH+'</b> tuong</span></div>'+
    '</div>';
  }
  cols.innerHTML=html;

  // Event delegation
  cols.addEventListener("click",function handler(e){
    cols.removeEventListener("click",handler);
    var el=e.target.closest?e.target.closest("[data-action]"):null;
    if(!el){ render(); return; }
    var a=el.dataset.action, tid=parseInt(el.dataset.tid);
    if(a==="del") delTeam(tid);
    else if(a==="star") setRating(tid,parseInt(el.dataset.v));
    else if(a==="addh") addHero(tid,el.dataset.lane);
    else if(a==="inc") adjCnt(tid,el.dataset.lane,parseInt(el.dataset.hi),1);
    else if(a==="dec") adjCnt(tid,el.dataset.lane,parseInt(el.dataset.hi),-1);
    else if(a==="rm") removeHero(tid,el.dataset.lane,parseInt(el.dataset.hi));
    else if(a==="style") togStyle(tid,el.dataset.style);
    else if(a==="addban") addBan(tid);
    else if(a==="addpick") addPick(tid);
    else if(a==="rmban") rmBan(tid,parseInt(el.dataset.i));
    else if(a==="rmpick") rmPick(tid,parseInt(el.dataset.i));
    else render();
  });
  cols.addEventListener("click",function avHandler(e){
    cols.removeEventListener("click",avHandler);
    var av=e.target.closest?e.target.closest(".av-box"):null;
    if(av) openAvPicker(parseInt(av.dataset.tid),av.dataset.lane,parseInt(av.dataset.hi));
    else render();
  });
  cols.addEventListener("input",function inputHandler(e){
    cols.removeEventListener("input",inputHandler);
    var el=e.target; var tid=parseInt(el.dataset.tid);
    if(el.classList.contains("name-inp")){ teams.filter(function(t){return t.id===tid;})[0].name=el.value; save(); renderStats(); }
    else if(el.classList.contains("hero-inp")){ var t=teams.filter(function(t){return t.id===tid;})[0]; t.lanes[el.dataset.lane].h[parseInt(el.dataset.hi)].n=el.value; save(); }
    else if(el.classList.contains("wb-ta")||el.classList.contains("notes-ta")){ teams.filter(function(t){return t.id===tid;})[0][el.dataset.field]=el.value; save(); }
    render();
  });
  cols.addEventListener("keydown",function keyHandler(e){
    cols.removeEventListener("keydown",keyHandler);
    if(e.key==="Enter"){
      var el=e.target; var tid=parseInt(el.dataset&&el.dataset.tid);
      if(el.id&&el.id.indexOf("bi-")===0) addBan(tid);
      else if(el.id&&el.id.indexOf("pi-")===0) addPick(tid);
    } else render();
  });
  renderStats();
}

render();

</script>
</body>
</html>
